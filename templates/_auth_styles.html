<!-- Shared styles for signin.html and signup.html -->
<style>
  /* ── Full page layout ────────────────────────────────────────── */
  .auth-page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 2.5rem 1rem 3rem;
    background: #0a0a0a;
    font-family: 'Inter', system-ui, sans-serif;
    color: #e5e5e5;
  }

  /* ── Logo ────────────────────────────────────────────────────── */
  .auth-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 0.4rem;
  }
  .auth-logo-icon {
    width: 40px; height: 40px;
    background: #161f1a;
    border: 1px solid #1e3a2a;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .auth-logo-text {
    font-size: 1.2rem;
    font-weight: 700;
    color: #fff;
  }
  .auth-tagline {
    font-size: 0.82rem;
    color: #666;
    margin: 0 0 1.75rem;
  }

  /* ── Card ────────────────────────────────────────────────────── */
  .auth-card {
    background: #111;
    border: 1px solid #1e1e1e;
    border-radius: 16px;
    width: 100%;
    max-width: 420px;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    margin-bottom: 1.5rem;
  }

  /* ── Tabs ────────────────────────────────────────────────────── */
  .auth-tabs {
    display: flex;
    border-bottom: 1px solid #1e1e1e;
  }
  .auth-tab {
    flex: 1;
    text-align: center;
    padding: 0.9rem;
    font-size: 0.88rem;
    font-weight: 600;
    color: #666;
    text-decoration: none;
    border-bottom: 2px solid transparent;
    transition: all 0.18s;
  }
  .auth-tab:hover { color: #ccc; }
  .auth-tab.active {
    color: #2dd4bf;
    border-bottom-color: #2dd4bf;
    background: #0f0f0f;
  }

  /* ── Body ────────────────────────────────────────────────────── */
  .auth-body {
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  /* ── Google Button ───────────────────────────────────────────── */
  .auth-google-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    width: 100%;
    padding: 0.75rem;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    color: #e5e5e5;
    font-size: 0.9rem;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.18s;
  }
  .auth-google-btn:hover { background: #222; border-color: #3a3a3a; }

  /* ── Divider ─────────────────────────────────────────────────── */
  .auth-divider {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    color: #444;
    font-size: 0.78rem;
  }
  .auth-divider::before, .auth-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #222;
  }

  /* ── Form ────────────────────────────────────────────────────── */
  .auth-form {
    display: flex;
    flex-direction: column;
    gap: 0.85rem;
  }
  .auth-name-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }
  .auth-field-group {
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
  }
  .auth-label {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.07em;
    color: #777;
  }
  .auth-input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }
  .auth-input-icon {
    position: absolute;
    left: 12px;
    color: #555;
    pointer-events: none;
    flex-shrink: 0;
  }
  .auth-input {
    width: 100%;
    background: #161616;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 0.65rem 2.4rem 0.65rem 2.4rem;
    color: #e5e5e5;
    font-size: 0.88rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.18s;
    box-sizing: border-box;
  }
  /* Inputs that don't have a left icon — remove extra left padding */
  .auth-input-wrap:not(:has(.auth-input-icon)) .auth-input { padding-left: 0.8rem; }
  .auth-input:focus { border-color: #2dd4bf; }
  .auth-input::placeholder { color: #444; }
  .auth-eye-btn {
    position: absolute;
    right: 10px;
    background: transparent;
    border: none;
    color: #555;
    cursor: pointer;
    padding: 4px;
    display: flex;
  }
  .auth-eye-btn:hover { color: #999; }

  /* No left icon for last-name in signup */
  .auth-name-row .auth-field-group:last-child .auth-input { padding-left: 0.75rem; }

  /* ── Submit Button ───────────────────────────────────────────── */
  .auth-submit-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    width: 100%;
    padding: 0.8rem;
    background: #2dd4bf;
    color: #0a0a0a;
    border: none;
    border-radius: 10px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.18s;
    margin-top: 0.25rem;
  }
  .auth-submit-btn:hover { background: #22c5b0; }

  /* ── Link styles ─────────────────────────────────────────────── */
  .auth-link { color: #2dd4bf; text-decoration: none; }
  .auth-link:hover { text-decoration: underline; }
  .auth-switch-text {
    font-size: 0.82rem;
    color: #666;
    text-align: center;
    margin-top: 0.25rem;
  }
  .auth-terms-text {
    font-size: 0.75rem;
    color: #555;
    text-align: center;
    line-height: 1.5;
  }

  /* ── Back link ───────────────────────────────────────────────── */
  .auth-back-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 0.82rem;
    color: #666;
    text-decoration: none;
    margin-bottom: 1.25rem;
    transition: color 0.15s;
  }
  .auth-back-link:hover { color: #e5e5e5; }

  /* ── Trust row ───────────────────────────────────────────────── */
  .auth-trust-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 0.5rem 1rem;
  }
  .auth-trust-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.78rem;
    color: #555;
  }
  .auth-trust-sep { color: #2a2a2a; }

  /* ── Mobile Responsiveness ───────────────────────────────────── */
  @media (max-width: 480px) {
    .auth-page {
      padding: 1.5rem 0.75rem 2rem !important;
    }
    .auth-card {
      padding: 0 !important;
      border-radius: 12px !important;
    }
    .auth-body {
      padding: 1.25rem 1rem !important;
      gap: 0.85rem !important;
    }
    .auth-logo {
      margin-bottom: 0.2rem !important;
    }
    .auth-tagline {
      margin: 0 0 1.25rem !important;
    }
    .auth-name-row {
      grid-template-columns: 1fr !important;
      gap: 0.75rem !important;
    }
    .auth-google-btn, .auth-submit-btn {
      padding: 0.7rem !important;
      font-size: 0.88rem !important;
    }
    .auth-trust-row {
      gap: 0.4rem 0.75rem !important;
    }
    .auth-trust-sep {
      display: none !important;
    }
  }
</style>
